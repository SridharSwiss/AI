name: Daily AI Content Maintenance

on:
  schedule:
    # 04:00 UTC = 06:00 CET (summer). Runs free — no API key needed.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-update:
    name: Update daily-updates.json from recent commits
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/upbeat-feynman-HrqTF
          fetch-depth: 50

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ai-hub/package-lock.json

      - name: Install dependencies
        working-directory: ai-hub
        run: npm ci

      - name: Generate daily-updates.json from git log
        run: |
          node -e "
          const { execSync } = require('child_process');
          const fs = require('fs');

          const today = new Date().toISOString().split('T')[0];

          // Get commits from the last 24 hours
          let log = '';
          try {
            log = execSync('git log --since=\"24 hours ago\" --pretty=format:\"%s\" -- ai-hub/', {
              encoding: 'utf8'
            }).trim();
          } catch(e) { log = ''; }

          const lines = log ? log.split('\n').filter(Boolean) : [];

          if (lines.length === 0) {
            console.log('No commits in last 24h — skipping update');
            process.exit(0);
          }

          // Map commit messages to category changes
          const categoryMap = {
            'tools':      { icon: 'chart',  category: 'Tools' },
            'compan':     { icon: 'chart',  category: 'Companies' },
            'case stud':  { icon: 'chart',  category: 'Case Studies' },
            'case-stud':  { icon: 'chart',  category: 'Case Studies' },
            'compliance': { icon: 'shield', category: 'Compliance' },
            'framework':  { icon: 'shield', category: 'Compliance' },
            'learn':      { icon: 'book',   category: 'Learning' },
            'resource':   { icon: 'book',   category: 'Learning' },
            'playbook':   { icon: 'tools',  category: 'Consulting Toolkit' },
            'toolkit':    { icon: 'tools',  category: 'Consulting Toolkit' },
            'news':       { icon: 'news',   category: 'News Sources' },
          };

          const grouped = {};
          for (const line of lines) {
            const lower = line.toLowerCase();
            let matched = false;
            for (const [key, val] of Object.entries(categoryMap)) {
              if (lower.includes(key)) {
                if (!grouped[val.category]) grouped[val.category] = { ...val, items: [] };
                // Clean up commit message for display
                const clean = line.replace(/^(feat|fix|chore|add|update|daily maintenance \\d{4}-\\d{2}-\\d{2}:?\\s*)/i, '').trim();
                if (clean && !grouped[val.category].items.includes(clean)) {
                  grouped[val.category].items.push(clean.charAt(0).toUpperCase() + clean.slice(1));
                }
                matched = true;
                break;
              }
            }
            if (!matched) {
              if (!grouped['General']) grouped['General'] = { icon: 'chart', category: 'General', items: [] };
              const clean = line.trim();
              if (clean) grouped['General'].items.push(clean.charAt(0).toUpperCase() + clean.slice(1));
            }
          }

          const changes = Object.values(grouped).filter(g => g.items.length > 0);
          const totalItems = changes.reduce((n, c) => n + c.items.length, 0);
          const categoryNames = changes.map(c => c.category).join(', ');

          const output = {
            date: today,
            summary: totalItems === 0
              ? 'Content verified — all screens up to date.'
              : \`Updated \${totalItems} item\${totalItems === 1 ? '' : 's'} across \${categoryNames}.\`,
            changes,
          };

          fs.writeFileSync('ai-hub/src/data/daily-updates.json', JSON.stringify(output, null, 2) + '\n');
          console.log('Written daily-updates.json for', today);
          console.log(JSON.stringify(output, null, 2));
          "

      - name: Type-check
        working-directory: ai-hub
        run: npx tsc --noEmit

      - name: Commit and push if changed
        run: |
          git config user.name "AIHub Daily Bot"
          git config user.email "bot@sridhar-ai.ch"
          git add ai-hub/src/data/daily-updates.json
          if git diff --staged --quiet; then
            echo "daily-updates.json unchanged — nothing to commit."
          else
            git commit -m "Daily update $(date +%Y-%m-%d): refresh what's-new banner"
            git push origin claude/upbeat-feynman-HrqTF
            echo "Pushed daily-updates.json"
          fi
